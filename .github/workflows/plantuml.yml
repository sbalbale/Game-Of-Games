name: Generate PlantUML

on: push

jobs:
  generate_plantuml:
    runs-on: ubuntu-latest
    name: plantuml
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Plantuml for markdown
        uses: alessandro-marcantoni/puml-markdown@v0.1.1
